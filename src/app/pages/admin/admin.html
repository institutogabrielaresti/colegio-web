<section class="admin">

<h1>Publicar Noticia</h1>

<form (ngSubmit)="publicar()">

<input
type="text"
placeholder="Título"
[(ngModel)]="titulo"
name="titulo"
required
>

<textarea
placeholder="Descripción"
[(ngModel)]="descripcion"
name="descripcion"
required
></textarea>

<input
type="date"
[(ngModel)]="fecha"
name="fecha"
required
>

<button type="submit">
Publicar noticia
</button>

</form>

<p *ngIf="mensaje">{{mensaje}}</p>

</section>
